{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Conectados por Mendoza Futura</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="{% static 'img/logo.png' %}" alt="Logo" class="logo">
      <div>
        <h1 class="brand-title">Conectados</h1>
        <span class="brand-subtitle">por Mendoza Futura</span>
      </div>
    </div>
    <div class="usuario-header">Invitado</div>
  </header>

  <nav>
    <a href="#" class="nav-link">Inicio</a>
  </nav>

  <main style="display:flex; justify-content:center; align-items:center;">
    <div class="card" style="max-width:450px; width:100%; padding:32px;">
      <div style="text-align:center; margin-bottom:20px;">
        <img src="{% static 'img/logo.png' %}" alt="Logo" style="width:90px;">
      </div>

      <h2 style="text-align:center; color:var(--primario); margin-bottom:8px;">LOGIN</h2>
      <p style="text-align:center; color:var(--texto-muted); margin-bottom:24px;">Iniciá sesión para continuar</p>

      {% if error %}
      <div class="mensaje-error">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="campo">
          <label for="username">Usuario</label>
          <input type="text" name="username" id="username" placeholder="Ingresá tu usuario" required>
        </div>

        <div class="campo">
          <label for="password">Contraseña</label>
          <input type="password" name="password" id="password" placeholder="Ingresá tu contraseña" required>
        </div>

        <button type="submit" class="btn btn-secundario" style="width:100%; padding:14px; font-size:16px;">
          Iniciar sesión
        </button>
      </form>
    </div>
  </main>

  <footer>&copy; 2026 Conectados por Mendoza Futura</footer>
</body>
</html>
