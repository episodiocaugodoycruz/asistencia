<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Conectados por Mendoza Futura</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo-area">
            <img src="img/logo-conectados.png" alt="Logo">
            <div>
                <h1>Conectados</h1>
                <span>por Mendoza Futura</span>
            </div>
        </div>

        <div class="usuario">
            Invitado
        </div>
    </header>

    <!-- NAV -->
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Asistencia</a>
        <a href="#">Estudiantes</a>
        <a href="#">Cursos</a>
        <a href="#">Contacto</a>
    </nav>

    <!-- MAIN -->
    <main>

        <section class="login-card">

            <div class="logo-login">
                <img src="img/logo-conectados.png" alt="">
            </div>

            <h2>LOGIN</h2>
            <p>Iniciá sesión para continuar</p>

            <form>

                <div class="campo">
                    <label>Email o usuario</label>
                    <input
                        type="email"
                        placeholder="Ingresá tu correo electrónico">
                </div>

                <div class="campo">
                    <label>Contraseña</label>
                    <input
                        type="password"
                        placeholder="Ingresá tu contraseña">
                </div>

                <div class="opciones">

                    <label class="recordar">
                        <input type="checkbox">
                        Recordarme
                    </label>

                    <a href="#">
                        ¿Olvidaste tu contraseña?
                    </a>

                </div>

                <button type="submit">
                    Iniciar sesión
                </button>

            </form>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        © 2026 Conectados por Mendoza Futura - Sistema de Asistencia Escolar
    </footer>

</body>
</html>
